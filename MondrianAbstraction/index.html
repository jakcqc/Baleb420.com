<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset="utf-8">
        <title>ABSTRACTION</title>
        <link href="https://fonts.googleapis.com/css2?family=Alata&family=Courier+Prime:wght@700&family=Kosugi+Maru&family=Kumbh+Sans&family=Scheherazade:wght@700&display=swap" rel="stylesheet">
<style>

body {
  font-family: 'Kosugi Maru','Scheherazade','Kumbh Sans','Courier Prime','Alata', sans-serif;
  margin: 0;
  background-color: black;
  background-image: linear-gradient(white,white);
  overflow-x: hidden;
}

rect {
  fill: white;
  stroke: black;
  stroke-width: .3px;
}
#infoBar{
  /* background-color: white; */
  height: 50px;
  border-top: 5px solid black;
  border-bottom: 5px solid black;
  position: static;
  text-decoration: underline;
  width: 100%;
  font-size: 48px;
  padding: 3px;
  text-align: center;

}
</style>
</head>
<body>
<div id = "infoBar">MONDRIAN ABSTRACTION</div>
<script src="//d3js.org/d3.v3.min.js"></script>
<script>

var w = 1900,
    h = 2000,
    z = 50,
    x = w / z,
    y = h / z;

var hue = 0,
    hueBody = 0;


var svg = d3.select("body").append("svg")
    .attr("width", w)
    .attr("height", h);

svg.selectAll("rect")
    .data(d3.range(x * y))
    .enter().append("rect")
     .attr("x", translateX)
    .attr("y", translateY)
    
    .attr("width", z)
    .attr("height", z)
    // .style("fill", function(d) { return d3.hsl((d % x / x * 360), 1, Math.floor(d / x) / y); })
    .on("mouseover", mouseover);

function translateX(d){
        return ((d % x) * z)
}
function translateY(d){
      return (Math.floor(d / x) * z)
}

function translate(d) {
  return "translate("+(d % x) * z+","+Math.floor(d / x) * z+")";
}

function mouseover(d) {
  this.parentNode.appendChild(this);

  d3.select(this)
    .transition()
      .duration(700)
       .attr("x", "0")
       .attr("y", "0")
        .attr("transform", "translate(950,700)scale(1)rotate(180)")
        .style("fill-opacity",  .1)
        .style("stroke","black")
        .style("stroke-width"," 5px")
    .transition()
      .delay(1200)
      .attr("x","0")
      .attr("y","0")
      .attr("transform", "translate(" + (Math.floor(Math.random()*1830)+0)+ "," + (Math.floor(Math.random()*1930)+0) + ")scale("+(Math.floor(Math.random()*2.6) + 1)+")")
      .style("stroke-width"," 3px")
      .style("stroke", "black")
      .style("fill-opacity", .45)
      .style("fill", function(d) {
        if(hue != 360){
          hue++; 
        }else{
          hue = 0;
        }
        
        console.log(hue);
        return d3.hsl(hue, 1,.60);
        })
    // .remove();
}

</script>
</body>
</html>
